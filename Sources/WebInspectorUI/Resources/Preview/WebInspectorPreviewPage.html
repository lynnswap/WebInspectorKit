<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WebInspectorKit Preview</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: linear-gradient(135deg, #eef4ff 0%, #fff8ea 52%, #f4fff5 100%);
        color: #1d1d1f;
      }

      main {
        min-height: 100vh;
        padding: 24px 20px 320px;
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 2;
        display: flex;
        gap: 8px;
        justify-content: center;
        padding: 12px 0 24px;
        backdrop-filter: blur(16px);
      }

      nav a {
        border: 1px solid rgba(60, 60, 67, 0.2);
        border-radius: 999px;
        padding: 8px 12px;
        color: inherit;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.74);
      }

      nav a[aria-current="page"] {
        border-color: rgba(0, 122, 255, 0.55);
        color: #0057b8;
        background: rgba(222, 238, 255, 0.88);
      }

      .page {
        max-width: 760px;
        margin: 0 auto;
      }

      .hero {
        margin: 18px 0 28px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 44px;
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        font-size: 17px;
        line-height: 1.5;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px;
      }

      article,
      aside {
        border: 1px solid rgba(60, 60, 67, 0.18);
        border-radius: 8px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }

      h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      ul {
        margin: 10px 0 0;
        padding-left: 20px;
        line-height: 1.6;
      }

      button {
        margin-top: 14px;
        border: 0;
        border-radius: 8px;
        padding: 10px 14px;
        color: white;
        font: inherit;
        font-weight: 700;
        background: #0a84ff;
      }

      .metric {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
      }

      .metric strong {
        font-size: 28px;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(135deg, #0f1724 0%, #292312 52%, #132018 100%);
          color: #f5f5f7;
        }

        nav a,
        article,
        aside {
          border-color: rgba(235, 235, 245, 0.2);
          background: rgba(28, 28, 30, 0.72);
        }

        nav a[aria-current="page"] {
          color: #a7d2ff;
          background: rgba(10, 132, 255, 0.24);
        }
      }
    </style>
  </head>
  <body>
    <main id="preview-root">
      <nav aria-label="Preview pages">
        <a href="/overview" data-route="overview">Overview</a>
        <a href="/catalog" data-route="catalog">Catalog</a>
        <a href="/settings" data-route="settings">Settings</a>
      </nav>
      <section id="page" class="page" data-current-route="overview"></section>
    </main>
    <script>
      const routes = {
        overview: {
          path: "/overview",
          title: "Overview",
          html: `
            <section class="hero" data-preview-section="hero">
              <h1>Inspect a live WKWebView</h1>
              <p>
                This shared preview page is loaded from WebInspectorUI resources,
                then V2_WIViewController is attached and presented as a sheet.
              </p>
            </section>
            <section class="grid" aria-label="Preview cards">
              <article data-card-id="dom">
                <h2>DOM</h2>
                <p>Nested elements and attributes are available for inspection.</p>
              </article>
              <article data-card-id="network">
                <h2>Network</h2>
                <p>The inspector is connected to the same WKWebView instance.</p>
              </article>
              <article data-card-id="sheet">
                <h2>Sheet</h2>
                <p>The page stays visible behind the medium detent.</p>
              </article>
            </section>
          `
        },
        catalog: {
          path: "/catalog",
          title: "Catalog",
          html: `
            <section class="hero" data-preview-section="catalog">
              <h1>Preview catalog</h1>
              <p>
                Route changes update the URL and replace the DOM so inspector reloads
                can inspect a different page shape without leaving the preview file.
              </p>
            </section>
            <section class="grid" aria-label="Catalog metrics">
              <article class="metric" data-metric="nodes"><span>Nodes</span><strong>128</strong></article>
              <article class="metric" data-metric="requests"><span>Requests</span><strong>12</strong></article>
              <article class="metric" data-metric="events"><span>Events</span><strong>34</strong></article>
            </section>
          `
        },
        settings: {
          path: "/settings",
          title: "Settings",
          html: `
            <section class="hero" data-preview-section="settings">
              <h1>Preview settings</h1>
              <p>
                The controls below mutate attributes and text content, which gives
                the DOM panel a simple live page to inspect.
              </p>
            </section>
            <aside data-panel="settings" data-mode="automatic">
              <h2>Inspector target</h2>
              <ul>
                <li data-setting="theme">Theme: automatic</li>
                <li data-setting="layout">Layout: sheet over WKWebView</li>
                <li data-setting="routing">Routing: History API</li>
              </ul>
              <button type="button" id="toggle-mode">Toggle mode</button>
            </aside>
          `
        }
      };

      const page = document.querySelector("#page");
      const routeLinks = Array.from(document.querySelectorAll("[data-route]"));

      function routeFromLocation() {
        const pathRoute = Object.values(routes).find((route) => route.path === window.location.pathname);
        return Object.keys(routes).find((key) => routes[key] === pathRoute) || "overview";
      }

      function render(routeName, options = {}) {
        const route = routes[routeName] || routes.overview;
        page.dataset.currentRoute = routeName;
        page.innerHTML = route.html;
        document.title = `${route.title} - WebInspectorKit Preview`;

        for (const link of routeLinks) {
          link.setAttribute("aria-current", link.dataset.route === routeName ? "page" : "false");
        }

        const modeButton = document.querySelector("#toggle-mode");
        modeButton?.addEventListener("click", () => {
          const panel = document.querySelector("[data-panel='settings']");
          const theme = document.querySelector("[data-setting='theme']");
          const nextMode = panel.dataset.mode === "automatic" ? "manual" : "automatic";
          panel.dataset.mode = nextMode;
          theme.textContent = `Theme: ${nextMode}`;
        });

        if (options.replaceHistory === true) {
          history.replaceState({ route: routeName }, "", route.path);
        } else if (options.updateHistory !== false && window.location.pathname !== route.path) {
          history.pushState({ route: routeName }, "", route.path);
        }
      }

      for (const link of routeLinks) {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          render(link.dataset.route);
        });
      }

      window.addEventListener("popstate", () => {
        render(routeFromLocation(), { updateHistory: false });
      });

      render(routeFromLocation(), { replaceHistory: true });
    </script>
  </body>
</html>
