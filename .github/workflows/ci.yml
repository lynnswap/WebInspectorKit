name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  datakit-symbol-boundary:
    name: DataKit Symbol Boundary
    runs-on: macos-26
    timeout-minutes: 10
    env:
      XCODE_MAJOR: '26'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve Xcode
        run: |
          ruby <<'RUBY'
          xcode_major = ENV.fetch("XCODE_MAJOR", "")

          candidates = Dir["/Applications/Xcode*.app"].select { |path| File.directory?(path) }
          candidates = candidates.select do |path|
            xcode_major.empty? || File.basename(path).match?(/Xcode_#{Regexp.escape(xcode_major)}(?:[_.-]|\z)/)
          end

          def prerelease_xcode_path?(path)
            labels = [path, File.realpath(path)].map { |candidate| File.basename(candidate).downcase }
            labels.any? do |label|
              label.match?(/beta|release[ _-]?candidate|(?:^|[_. -])rc(?:$|[_. -])/)
            end
          end

          candidates = candidates.reject { |path| prerelease_xcode_path?(path) }

          def version_components(path)
            version = File.basename(path)[/Xcode[_-](\d+(?:[._]\d+)*)/, 1]
            version.to_s.tr("_", ".").split(".").map(&:to_i)
          end

          selected = candidates.max_by { |path| version_components(path) }
          abort("No stable Xcode#{xcode_major.empty? ? "" : " #{xcode_major}"} installation found") unless selected

          File.open(ENV.fetch("GITHUB_ENV"), "a") do |env|
            env.puts "DEVELOPER_DIR=#{selected}/Contents/Developer"
          end
          puts "Resolved Xcode: #{selected}"
          RUBY

      - name: Verify DataKit public symbol boundary
        run: Scripts/check-datakit-symbol-boundary.sh

  contract-tests:
    name: Consumer Contract Tests
    runs-on: macos-26
    timeout-minutes: 15
    env:
      XCODE_MAJOR: '26'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve Xcode
        run: |
          ruby <<'RUBY'
          xcode_major = ENV.fetch("XCODE_MAJOR", "")

          candidates = Dir["/Applications/Xcode*.app"].select { |path| File.directory?(path) }
          candidates = candidates.select do |path|
            xcode_major.empty? || File.basename(path).match?(/Xcode_#{Regexp.escape(xcode_major)}(?:[_.-]|\z)/)
          end

          def prerelease_xcode_path?(path)
            labels = [path, File.realpath(path)].map { |candidate| File.basename(candidate).downcase }
            labels.any? do |label|
              label.match?(/beta|release[ _-]?candidate|(?:^|[_. -])rc(?:$|[_. -])/)
            end
          end

          candidates = candidates.reject { |path| prerelease_xcode_path?(path) }

          def version_components(path)
            version = File.basename(path)[/Xcode[_-](\d+(?:[._]\d+)*)/, 1]
            version.to_s.tr("_", ".").split(".").map(&:to_i)
          end

          selected = candidates.max_by { |path| version_components(path) }
          abort("No stable Xcode#{xcode_major.empty? ? "" : " #{xcode_major}"} installation found") unless selected

          File.open(ENV.fetch("GITHUB_ENV"), "a") do |env|
            env.puts "DEVELOPER_DIR=#{selected}/Contents/Developer"
          end
          puts "Resolved Xcode: #{selected}"
          RUBY

      - name: Run consumer contract package tests
        run: swift test --package-path ContractTests

  ios-tests:
    name: iOS Tests (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: iOS 18 native
            runner: macos-15
            xcode_major: '26.3'
            ios_major: '18'
            test_mode: native-package
            test_scheme: WebInspectorNativeBridgeTests
            test_package_path: Packages/WebInspectorNativeBridge
            test_workspace: Packages/WebInspectorNativeBridge/WebInspectorNativeBridge.xcworkspace
          - name: iOS 26 all
            runner: macos-26
            xcode_major: '26'
            ios_major: '26'
            test_mode: workspace
            test_scheme: WebInspectorKitTests
            test_package_path: .
            test_workspace: WebInspectorKit.xcworkspace
            simulator_device: iPhone 17 Pro
          - name: iOS 26 native
            runner: macos-26
            xcode_major: '26'
            ios_major: '26'
            test_mode: native-package
            test_scheme: WebInspectorNativeBridgeTests
            test_package_path: Packages/WebInspectorNativeBridge
            test_workspace: Packages/WebInspectorNativeBridge/WebInspectorNativeBridge.xcworkspace
            simulator_device: iPhone 17 Pro
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    env:
      XCODE_MAJOR: ${{ matrix.xcode_major }}
      IOS_MAJOR: ${{ matrix.ios_major }}
      TEST_MODE: ${{ matrix.test_mode }}
      TEST_SCHEME: ${{ matrix.test_scheme }}
      TEST_PACKAGE_PATH: ${{ matrix.test_package_path }}
      TEST_WORKSPACE: ${{ matrix.test_workspace }}
      SIMULATOR_DEVICE: ${{ matrix.simulator_device }}
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve Xcode
        run: |
          ruby <<'RUBY'
          xcode_major = ENV.fetch("XCODE_MAJOR", "")

          candidates = Dir["/Applications/Xcode*.app"].select { |path| File.directory?(path) }
          candidates = candidates.select do |path|
            xcode_major.empty? || File.basename(path).match?(/Xcode_#{Regexp.escape(xcode_major)}(?:[_.-]|\z)/)
          end

          def prerelease_xcode_path?(path)
            labels = [path, File.realpath(path)].map { |candidate| File.basename(candidate).downcase }
            labels.any? do |label|
              label.match?(/beta|release[ _-]?candidate|(?:^|[_. -])rc(?:$|[_. -])/)
            end
          end

          candidates = candidates.reject { |path| prerelease_xcode_path?(path) }

          def version_components(path)
            version = File.basename(path)[/Xcode[_-](\d+(?:[._]\d+)*)/, 1]
            version.to_s.tr("_", ".").split(".").map(&:to_i)
          end

          selected = candidates.max_by { |path| version_components(path) }
          abort("No stable Xcode#{xcode_major.empty? ? "" : " #{xcode_major}"} installation found") unless selected

          File.open(ENV.fetch("GITHUB_ENV"), "a") do |env|
            env.puts "DEVELOPER_DIR=#{selected}/Contents/Developer"
          end
          puts "Resolved Xcode: #{selected}"
          RUBY

      - name: Check Swift tools compatibility
        run: |
          ruby <<'RUBY'
          package_path = ENV.fetch("TEST_PACKAGE_PATH", ".")
          package_path = "." if package_path.empty?
          manifest_path = File.join(package_path, "Package.swift")
          required = File.read(manifest_path)[/swift-tools-version:\s*(\d+(?:\.\d+)*)/, 1]
          abort("#{manifest_path} does not declare swift-tools-version") unless required

          output = `swift package --version 2>&1`
          abort(output) unless $?.success?

          installed = output[/Swift Package Manager - Swift\s+(\d+(?:\.\d+)*)/, 1]
          abort("Unable to parse SwiftPM version from: #{output}") unless installed

          def version_components(version)
            version.split(".").map(&:to_i)
          end

          def version_lt?(lhs, rhs)
            lhs_components = version_components(lhs)
            rhs_components = version_components(rhs)
            length = [lhs_components.length, rhs_components.length].max
            lhs_components.fill(0, lhs_components.length...length)
            rhs_components.fill(0, rhs_components.length...length)
            (lhs_components <=> rhs_components) == -1
          end

          unsupported = version_lt?(installed, required)
          File.open(ENV.fetch("GITHUB_ENV"), "a") do |env|
            env.puts "SKIP_IOS_TESTS=#{unsupported}"
          end

          if unsupported
            puts output
            puts "::warning::Skipping #{ENV.fetch("TEST_SCHEME")} at #{package_path} because SwiftPM #{installed} cannot resolve swift-tools-version #{required}."
          else
            puts "SwiftPM #{installed} satisfies #{manifest_path} swift-tools-version #{required}."
          end
          RUBY

      - name: Resolve iOS simulator destination
        run: |
          ruby <<'RUBY'
          require "json"

          if ENV["SKIP_IOS_TESTS"] == "true"
            puts "Skipping simulator resolution: Swift tools version is unsupported."
            exit 0
          end

          ios_major = ENV.fetch("IOS_MAJOR")
          xcode_major = ENV.fetch("XCODE_MAJOR")
          simulator_device = ENV.fetch("SIMULATOR_DEVICE", "")

          def write_destination(destination:, version:)
            File.open(ENV.fetch("GITHUB_ENV"), "a") do |env|
              env.puts "DESTINATION=#{destination}"
              env.puts "RESOLVED_IOS_VERSION=#{version}"
            end
          end

          if ios_major == xcode_major && !simulator_device.empty?
            sdk_version = `xcodebuild -version -sdk iphonesimulator SDKVersion`.strip
            abort("Unable to resolve iPhoneSimulator SDK version") unless $?.success? && !sdk_version.empty?
            abort("Resolved iPhoneSimulator SDK #{sdk_version}, expected iOS #{ios_major}.x") unless sdk_version.split(".").first == ios_major

            write_destination(
              destination: "platform=iOS Simulator,name=#{simulator_device},OS=#{sdk_version}",
              version: sdk_version
            )
            puts "Resolved simulator destination from iOS SDK: #{simulator_device} iOS #{sdk_version}"
            exit 0
          end

          devices = JSON.parse(`xcrun simctl list devices available --json`).fetch("devices")
          matches = []

          devices.each do |runtime, runtime_devices|
            next unless runtime =~ /SimRuntime\.iOS-(\d+(?:-\d+)*)$/

            version = Regexp.last_match(1).tr("-", ".")
            next if version.split(".").first != ios_major

            available_devices = runtime_devices.select { |device| device.fetch("isAvailable", true) }
            preferred_devices = available_devices.select { |device| device["name"].start_with?("iPhone") }
            selected_devices = preferred_devices.empty? ? available_devices : preferred_devices

            selected_devices.each do |device|
              matches << [version.split(".").map(&:to_i), version, device.fetch("name"), device.fetch("udid")]
            end
          end

          if matches.empty?
            warn "No available iOS #{ios_major}.x simulator found"
            system("xcrun simctl list devices available")
            exit 1
          end

          _, version, device_name, udid = matches.max_by { |components, _, _, _| components }
          write_destination(destination: "platform=iOS Simulator,id=#{udid}", version: version)
          puts "Resolved simulator: #{device_name} iOS #{version} (#{udid})"
          RUBY

      - name: Show Xcode and simulator environment
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          echo "Destination: ${DESTINATION}"
          echo "Resolved iOS: ${RESOLVED_IOS_VERSION}"
          echo "Test mode: ${TEST_MODE}"
          echo "Test scheme: ${TEST_SCHEME}"
          echo "Test package path: ${TEST_PACKAGE_PATH}"
          echo "Test workspace: ${TEST_WORKSPACE}"

      - name: Run iOS tests
        run: |
          set -e -o pipefail

          if [ "${SKIP_IOS_TESTS:-false}" = "true" ]; then
            echo "Skipping ${TEST_SCHEME}: selected Xcode cannot resolve this Swift tools version."
            exit 0
          fi

          if [ "${TEST_MODE}" = "native-package" ]; then
            derived_data="${RUNNER_TEMP}/${TEST_SCHEME}-DerivedData"
            log_path="${RUNNER_TEMP}/xcodebuild-${TEST_SCHEME}.log"

            rm -rf "${derived_data}" "${log_path}"

            xcodebuild build-for-testing \
              -workspace "${TEST_WORKSPACE}" \
              -scheme "${TEST_SCHEME}" \
              -sdk iphonesimulator \
              -derivedDataPath "${derived_data}" \
              -enableCodeCoverage NO \
              ARCHS=arm64 \
              ONLY_ACTIVE_ARCH=YES \
              -showBuildTimingSummary \
              | tee "${log_path}"

            xctestrun="$(find "${derived_data}/Build/Products" -name '*.xctestrun' -print -quit)"
            if [ -z "${xctestrun}" ]; then
              echo "No .xctestrun generated under ${derived_data}/Build/Products" >&2
              exit 1
            fi

            patched_xctestrun="${xctestrun%.xctestrun}-iphonesimulator.xctestrun"
            rm -f "${patched_xctestrun}"
            cp "${xctestrun}" "${patched_xctestrun}"
            plutil -convert xml1 "${patched_xctestrun}"

            PATCHED_XCTESTRUN="${patched_xctestrun}" ruby <<'RUBY'
            path = ENV.fetch("PATCHED_XCTESTRUN")
            scheme = ENV.fetch("TEST_SCHEME")
            test_bundle = "#{scheme}.xctest"

            data = File.read(path)
            macos_bundle_path = "__TESTROOT__/Debug/#{test_bundle}"
            simulator_bundle_path = "__TESTROOT__/Debug-iphonesimulator/#{test_bundle}"
            macos_xctest_agent = "__PLATFORMS__/MacOSX.platform/Developer/Library/Xcode/Agents/xctest"
            simulator_xctest_agent = "__PLATFORMS__/iPhoneSimulator.platform/Developer/Library/Xcode/Agents/xctest"

            already_simulator = data.include?(simulator_bundle_path) && data.include?(simulator_xctest_agent)
            exit if already_simulator

            required = [macos_bundle_path, macos_xctest_agent]
            missing = required.reject { |needle| data.include?(needle) }
            abort("Unexpected xctestrun layout for #{scheme}: missing #{missing.join(", ")}") unless missing.empty?

            replacements = {
              macos_bundle_path => simulator_bundle_path,
              macos_xctest_agent => simulator_xctest_agent,
              "__PLATFORMS__/MacOSX.platform/Developer/Library/Frameworks" => "__PLATFORMS__/iPhoneSimulator.platform/Developer/Library/Frameworks",
              "__PLATFORMS__/MacOSX.platform/Developer/usr/lib" => "__PLATFORMS__/iPhoneSimulator.platform/Developer/usr/lib",
              "<string>arm64e</string>" => "<string>arm64</string>",
            }

            replacements.each do |from, to|
              data = data.gsub(from, to)
            end
            data = data.gsub("__TESTROOT__/Debug:", "__TESTROOT__/Debug-iphonesimulator:")
            data = data.gsub("__TESTROOT__/Debug<", "__TESTROOT__/Debug-iphonesimulator<")

            File.write(path, data)
          RUBY

            plutil -lint "${patched_xctestrun}"

            xcodebuild test-without-building \
              -xctestrun "${patched_xctestrun}" \
              -destination "${DESTINATION}" \
              -parallel-testing-enabled NO \
              -maximum-concurrent-test-simulator-destinations 1 \
              -test-timeouts-enabled YES \
              -default-test-execution-time-allowance 30 \
              -maximum-test-execution-time-allowance 60 \
              -resultBundlePath "${RUNNER_TEMP}/${TEST_SCHEME}.xcresult" \
              | tee -a "${log_path}"
          elif [ -n "${TEST_WORKSPACE}" ]; then
            xcodebuild test \
              -workspace "${TEST_WORKSPACE}" \
              -scheme "${TEST_SCHEME}" \
              -destination "${DESTINATION}" \
              -enableCodeCoverage NO \
              -parallel-testing-enabled NO \
              -maximum-concurrent-test-simulator-destinations 1 \
              -test-timeouts-enabled YES \
              -default-test-execution-time-allowance 30 \
              -maximum-test-execution-time-allowance 60 \
              -showBuildTimingSummary \
              -resultBundlePath "${RUNNER_TEMP}/${TEST_SCHEME}.xcresult" \
              | tee "${RUNNER_TEMP}/xcodebuild-${TEST_SCHEME}.log"
          else
            (
              cd "${TEST_PACKAGE_PATH}"
              xcodebuild test \
                -scheme "${TEST_SCHEME}" \
                -destination "${DESTINATION}" \
                -enableCodeCoverage NO \
                -parallel-testing-enabled NO \
                -maximum-concurrent-test-simulator-destinations 1 \
                -test-timeouts-enabled YES \
                -default-test-execution-time-allowance 30 \
                -maximum-test-execution-time-allowance 60 \
                -showBuildTimingSummary \
                -resultBundlePath "${RUNNER_TEMP}/${TEST_SCHEME}.xcresult"
            ) | tee "${RUNNER_TEMP}/xcodebuild-${TEST_SCHEME}.log"
          fi

      - name: Upload iOS test diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-test-diagnostics-${{ matrix.name }}
          path: |
            ${{ runner.temp }}/xcodebuild-${{ env.TEST_SCHEME }}.log
            ${{ runner.temp }}/${{ env.TEST_SCHEME }}.xcresult
          if-no-files-found: ignore
